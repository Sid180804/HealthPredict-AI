# Render Blueprint for HealthPredict AI.
# Keep this file at the repository root. Render resolves each rootDir from here.

services:
  - type: web
    name: healthpredict-ml
    runtime: python
    rootDir: ml_service
    buildCommand: python -m pip install --upgrade pip setuptools wheel && python -m pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.14
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: healthpredict-backend
    runtime: node
    rootDir: review 1 (2)/review 1/ai medicine and disease prediction/backend-node
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.19.5
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: healthpredict-ml
          envVarKey: RENDER_EXTERNAL_URL
      - key: ALLOWED_ORIGINS
        sync: false
